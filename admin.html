<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NACOS Admin Dashboard</title>
  <style>
    :root { --dark: #0f2e1a; --gold: #ffd700; --green: #2ecc71; --red: #e74c3c; --gray: #f4f4f4; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--gray); }
    #loginScreen { display: flex; height: 100vh; justify-content: center; align-items: center; background: var(--dark); }
    .login-box { background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
    .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; }
    .login-box button { width: 100%; padding: 12px; background: var(--gold); color: var(--dark); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #dashboard { display: none; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--dark); color: white; padding: 25px; position: fixed; height: 100vh; overflow-y: auto; }
    .sidebar h2 { color: var(--gold); margin-bottom: 30px; font-size: 1.4em; }
    .nav-item { padding: 14px 15px; cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(255, 215, 0, 0.15); color: var(--gold); }
    .main { margin-left: 240px; padding: 30px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--gold); }
    .card h3 { font-size: 2em; color: var(--dark); margin-bottom: 5px; }
    .card p { color: #666; font-size: 0.9em; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    th, td { padding: 14px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; color: var(--dark); }
    .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
    .badge-verified { background: #d4edda; color: #155724; }
    .result-item { margin-bottom: 12px; }
    .result-bar-bg { background: #eee; height: 8px; border-radius: 4px; margin-top: 6px; overflow: hidden; }
    .result-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--gold); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 40px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main { margin-left: 0; } #dashboard { flex-direction: column; } }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-box">
      <h2 style="color: var(--dark);">🔐 Admin Access</h2>
      <input type="password" id="adminPass" placeholder="Enter Admin Password">
      <button onclick="login()">Login</button>
      <p style="font-size: 0.8em; color: #888; margin-top: 10px;">Default: nacosadmin</p>
    </div>
  </div>
  <div id="dashboard">
    <div class="sidebar">
      <h2>🏆 NACOS ADMIN</h2>
      <div class="nav-item active" onclick="showTab('overview')"> Overview</div>
      <div class="nav-item" onclick="showTab('payments')">💳 Payments Log</div>
      <div class="nav-item" onclick="showTab('hnd')">🎓 HND Results</div>
      <div class="nav-item" onclick="showTab('nd')">📚 ND Results</div>
      <div class="nav-item" onclick="location.reload()" style="margin-top: 40px; color: #ff6b6b;">🚪 Logout</div>
    </div>
    <div class="main">
      <div id="overview"><h1>Dashboard Overview</h1><div class="stats"><div class="card"><h3 id="statPay">0</h3><p>Total Payments</p></div><div class="card"><h3 id="statVer">0</h3><p>Verified Voters</p></div><div class="card"><h3 id="statVote">0</h3><p>Votes Cast</p></div><div class="card"><h3 id="statRev">₦0</h3><p>Est. Revenue</p></div></div></div>
      <div id="payments" style="display: none;"><h1>Payments Log</h1><input type="text" id="searchPay" placeholder=" Search by Name, Email or Reference..." style="padding: 12px; width: 100%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px;" onkeyup="renderPayments()"><table><thead><tr><th>Time</th><th>Name</th><th>Email</th><th>Reference</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead><tbody id="payTable"></tbody></table></div>
      <div id="hnd" style="display: none;"><h1> HND Results</h1><div id="hndContent"></div></div>
      <div id="nd" style="display: none;"><h1>📚 ND Results</h1><div id="ndContent"></div></div>
    </div>
  </div>
  <script>
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwlDEXSF4FBiaFWvV_Zk7LMbiI0qJNOwlpMNpYS97C7PR2m5NPSeabzbZG9Yerzhskuiw/exec';
    const ADMIN_PASS = 'nacosadmin';
    let dashboardData = null;
    const CATEGORIES = ["Most Influential", "Entrepreneur of the Year", "Most Handsome", "Most Beautiful", "Fashionista Male", "Fashionista Female", "Most Popular", "Most Expensive", "Brand of the Year", "Most Talented", "Best Couple", "Mr & Miss Charismatic", "Best Personality", "Most Dramatic"];

    function login() {
      if(document.getElementById('adminPass').value === ADMIN_PASS) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        loadDashboard();
      } else alert('❌ Incorrect Password');
    }
    function showTab(id) {
      document.querySelectorAll('.main > div').forEach(d => d.style.display = 'none');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(id).style.display = 'block';
      event.target.classList.add('active');
      if(id !== 'overview') renderTab(id);
    }
    async function loadDashboard() {
      try {
        const res = await fetch(BACKEND_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ action: 'getDashboard' }) });
        dashboardData = await res.json();
        document.getElementById('statPay').innerText = dashboardData.payments.length;
        const verified = dashboardData.payments.filter(p => p[6] === 'VERIFIED');
        document.getElementById('statVer').innerText = verified.length;
        document.getElementById('statVote').innerText = dashboardData.votes.length;
        document.getElementById('statRev').innerText = '₦' + verified.reduce((s,p)=>s+(parseFloat(p[7])||0),0).toLocaleString();
      } catch(err) { alert('Failed to load dashboard. Check BACKEND_URL.'); }
    }
    function renderPayments() {
      const search = document.getElementById('searchPay').value.toLowerCase();
      const tbody = document.getElementById('payTable'); tbody.innerHTML = '';
      dashboardData.payments.forEach(p => {
        if(p[1].toLowerCase().includes(search) || p[2].toLowerCase().includes(search) || p[3].toLowerCase().includes(search)) {
          tbody.innerHTML += `<tr><td>${new Date(p[0]).toLocaleString()}</td><td>${p[1]}</td><td>${p[2]}</td><td style="font-family:monospace; font-weight:bold;">${p[3]}</td><td>${p[4]}</td><td>₦${p[7]}</td><td><span class="badge badge-verified">${p[6]}</span></td></tr>`;
        }
      });
    }
    function renderTab(tab) {
      if(tab === 'payments') { renderPayments(); return; }
      const type = tab === 'hnd' ? 'hnd' : 'nd';
      const container = document.getElementById(`${type}Content`);
      container.innerHTML = '<div class="loader"></div>';
      let stats = {};
      dashboardData.votes.forEach(v => {
        try {
          const votesObj = JSON.parse(v[3]);
          Object.entries(votesObj).forEach(([catId, nominee]) => {
            if(catId.startsWith(type)) {
              const num = parseInt(catId.split('_cat')[1]);
              const catName = `Category ${num} - ${CATEGORIES[num-1]}`;
              if(!stats[catName]) stats[catName] = {};
              stats[catName][nominee] = (stats[catName][nominee] || 0) + 1;
            }
          });
        } catch(e){}
      });
      container.innerHTML = '';
      if(Object.keys(stats).length === 0) { container.innerHTML = '<p style="text-align:center; color:#666;">No votes recorded yet.</p>'; return; }
      Object.keys(stats).forEach(cat => {
        let total = Object.values(stats[cat]).reduce((a,b)=>a+b,0);
        let sorted = Object.entries(stats[cat]).sort((a,b)=>b[1]-a[1]);
        let html = `<div class="card" style="margin-bottom: 20px;"><h3>${cat}</h3>`;
        sorted.forEach(([name, count]) => {
          let pct = (count/total*100).toFixed(1);
          html += `<div class="result-item"><div style="display:flex; justify-content:space-between; margin-bottom:4px;"><span style="font-weight:500;">${name}</span><strong>${count} votes (${pct}%)</strong></div><div class="result-bar-bg"><div class="result-bar" style="width:${pct}%; background:${type==='hnd'?'#667eea':'#f5576c'};"></div></div></div>`;
        });
        html += `</div>`; container.innerHTML += html;
      });
    }
  </script>
</body>
</html>
